name: Fetch Data
on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Run PSD fetch
        run: python scripts/fetch_psd.py
        continue-on-error: true
 
      - name: Run FRED fetch
        run: python scripts/fetch_fred.py
        continue-on-error: true
 
      - name: Run Export Sales fetch
        run: python scripts/fetch_exports.py
        continue-on-error: true
 
      - name: Run CGC GSW fetch
        run: python scripts/fetch_cgc.py
        continue-on-error: true
 
      - name: Run Prices fetch
        run: python scripts/fetch_prices.py
        continue-on-error: true
 
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update data $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
 
