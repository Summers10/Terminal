name: Fetch Data
on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:
 
permissions:
  contents: write
 
concurrency:
  group: fetch-data
  cancel-in-progress: false
 
jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install deps
        run: pip install --quiet yfinance requests pandas
 
      - name: Run NASS fetch
        env:
          NASS_API_KEY: ${{ secrets.NASS_API_KEY }}
        run: time python scripts/fetch_nass.py
        timeout-minutes: 5
        continue-on-error: true
 
      - name: Run PSD fetch
        run: time python scripts/fetch_psd.py
        timeout-minutes: 6
        continue-on-error: true
 
      - name: Run FRED fetch
        run: time python scripts/fetch_fred.py
        timeout-minutes: 4
        continue-on-error: true
 
      - name: Run Export Sales fetch
        run: time python scripts/fetch_exports.py
        timeout-minutes: 4
        continue-on-error: true
 
      - name: Run CGC GSW fetch
        run: time python scripts/fetch_cgc.py
        timeout-minutes: 4
        continue-on-error: true
 
      - name: Run StatsCan S&D fetch
        run: time python scripts/fetch_statscan.py
        timeout-minutes: 4
        continue-on-error: true
 
      - name: Run Prices fetch
        run: time python scripts/fetch_prices.py
        timeout-minutes: 4
        continue-on-error: true
 
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update data $(date -u +%Y-%m-%d)"
 
          for attempt in 1 2 3 4 5; do
            git pull --no-rebase --no-edit -X ours origin main || true
            if git push origin main; then
              echo "Pushed successfully on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt, retrying in 3s..."
            sleep 3
          done
          echo "All push attempts failed"
          exit 1
 
