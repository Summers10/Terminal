name: Fetch USDA Data
on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  fetch-data:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Run NASS fetch
        env:
          NASS_API_KEY: ${{ secrets.NASS_API_KEY }}
        run: python scripts/fetch_nass.py
        continue-on-error: true
 
      - name: Run PSD fetch
        run: python scripts/fetch_psd.py
        continue-on-error: true
 
      - name: Run FRED fetch
        run: python scripts/fetch_fred.py
        continue-on-error: true
 
      - name: Run Export Sales fetch
        run: python scripts/fetch_exports.py
        continue-on-error: true
 
      - name: Run CGC GSW fetch
        run: python scripts/fetch_cgc.py
        continue-on-error: true
 
      - name: Run StatsCan S&D fetch
        run: python scripts/fetch_statscan.py
        continue-on-error: true
 
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update data $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
 
 
