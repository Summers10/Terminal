#!/usr/bin/env python3
"""
Fetch Statistics Canada table 32-10-0013-01: Supply and disposition of grains.
Full S&D: beginning stocks, production, imports, supply, exports, food, feed,
domestic disappearance, ending stocks.
Writes data/aafc_data.js in AAFC_DATA format.

No API key required — public data.
Crop year: Aug-Jul for all grains except Corn/Soybeans (Sep-Aug).
Data is cumulative — July (or August for corn/soy) = full crop year.
"""
import os, sys, json, time, zipfile, csv, io
from urllib.request import urlopen, Request
from urllib.error import HTTPError, URLError

TABLE_ID = '32100013'

# StatsCan crop names → display names
CROP_MAP = {
    'Durum wheat':              'Durum',
    'Wheat, excluding durum':   'Wheat (ex Durum)',
    'Canola':                   'Canola',
    'Soybeans':                 'Soybeans',
    'Barley':                   'Barley',
    'Oats':                     'Oats',
    'Dry peas':                 'Dry Peas',
    'Lentils':                  'Lentils',
    'Flaxseed':                 'Flaxseed',
}

# Corn is in a separate table (32-10-0014-01) but also appears here sometimes
# If not, we skip it

# StatsCan S&D field names → our short keys
FIELD_MAP = {
    'Production':                       'prod',
    'Imports':                          'imports',
    'Total supplies':                   'supply',
    'Total exports':                    'exports',
    'Human food':                       'food',
    'Industrial use':                   'industrial',
    'Animal feed, waste and dockage':   'feed',
    'Total domestic disappearance':     'dom',
    'Total ending stocks':              'stocks',
    'Total beginning stocks':           'bs',
    'Seed requirements':                'seed',
}

# End-of-crop-year months (cumulative data — we want the final period)
# Most grains: crop year Aug-Jul, so July data = full year
# Corn/Soybeans: crop year Sep-Aug, so August data = full year
CROP_YEAR_END = {
    'Soybeans': 8,  # August
}
DEFAULT_CY_END = 7  # July for everything else


def fetch_csv():
    url = f'https://www150.statcan.gc.ca/n1/tbl/csv/{TABLE_ID}-eng.zip'
    print(f'Downloading {url}...')
    try:
        req = Request(url, headers={'User-Agent': 'Mozilla/5.0 Python/3'})
        with urlopen(req, timeout=90) as resp:
            data = resp.read()
    except (HTTPError, URLError) as e:
        print(f'ERROR: {e}', file=sys.stderr)
        return None
    try:
        with zipfile.ZipFile(io.BytesIO(data)) as zf:
            csv_name = [n for n in zf.namelist() if n.endswith('.csv') and not n.startswith('META')][0]
            print(f'Extracting {csv_name} ({round(len(data)/1024)}KB zip)...')
            return zf.read(csv_name).decode('utf-8-sig')
    except Exception as e:
        print(f'ERROR extracting: {e}', file=sys.stderr)
        return None


def parse_data(csv_text):
    """Parse CSV into {crop: {crop_year: {field: value}}}"""
    reader = csv.DictReader(io.StringIO(csv_text))
    # raw: {crop: {ref_date: {field: value}}}
    raw = {}

    for row in reader:
        if row.get('GEO', '') != 'Canada':
            continue

        crop_raw = row.get('Type of crop', '')
        crop_name = CROP_MAP.get(crop_raw)
        if not crop_name:
            continue

        field_raw = row.get('Supply and disposition of grains', '')
        field = FIELD_MAP.get(field_raw)
        if not field:
            continue

        ref_date = row.get('REF_DATE', '').strip()  # e.g. "2024-07"
        value_str = row.get('VALUE', '').strip()
        if not ref_date or not value_str:
            continue

        try:
            value = round(float(value_str.replace(',', '')))
        except ValueError:
            continue

        raw.setdefault(crop_name, {}).setdefault(ref_date, {})[field] = value

    # Now extract full crop-year data (take the end-of-year period)
    result = {}
    for crop_name, periods in raw.items():
        cy_end_month = CROP_YEAR_END.get(crop_name, DEFAULT_CY_END)
        crop_years = {}

        for ref_date, fields in periods.items():
            # ref_date = "2024-07"
            parts = ref_date.split('-')
            if len(parts) != 2:
                continue
            year, month = int(parts[0]), int(parts[1])

            # Only take end-of-crop-year data
            if month != cy_end_month:
                continue

            # Crop year label: for July 2024 data → crop year 2023-2024 (Aug 2023 to Jul 2024)
            if cy_end_month <= 8:
                cy_start = year - 1
            else:
                cy_start = year
            cy_label = f'{cy_start}-{str(cy_start+1)[-2:]}'

            crop_years[cy_label] = fields

        if crop_years:
            result[crop_name] = crop_years

    return result


def build_aafc_data(parsed):
    """Convert parsed data to AAFC_DATA format."""
    crops = {}

    # Sort crops in a nice order
    crop_order = ['Wheat (ex Durum)', 'Durum', 'Barley', 'Oats',
                  'Canola', 'Soybeans', 'Dry Peas', 'Lentils', 'Flaxseed']

    for crop_name in crop_order:
        if crop_name not in parsed:
            continue

        years_data = parsed[crop_name]
        sorted_years = sorted(years_data.keys())

        # Keep last 5 years
        if len(sorted_years) > 5:
            sorted_years = sorted_years[-5:]

        rows = []
        for cy in sorted_years:
            d = years_data[cy]
            total_use = (d.get('dom', 0) or 0) + (d.get('exports', 0) or 0)
            rows.append({
                'year': cy,
                'prod':    d.get('prod', 0),
                'bs':      d.get('bs', 0),
                'imports': d.get('imports', 0),
                'supply':  d.get('supply', 0),
                'exports': d.get('exports', 0),
                'food':    d.get('food'),
                'feed':    d.get('feed'),
                'seed':    d.get('seed'),
                'industrial': d.get('industrial'),
                'dom':     d.get('dom', 0),
                'stocks':  d.get('stocks', 0),
            })

        crops[crop_name] = {'rows': rows}

    # Find latest ref date for report_date
    latest_date = time.strftime('%B %d, %Y', time.gmtime())

    return {
        'report_date': latest_date,
        'crops': crops,
        'notes': [
            'Crop year Aug\u2013Jul except Soybeans (Sep\u2013Aug).',
            'All volumes in thousand tonnes.',
            f'Source: Statistics Canada table 32-10-0013-01 \u00b7 Auto-updated {time.strftime("%Y-%m-%d", time.gmtime())}.'
        ]
    }


def main():
    csv_text = fetch_csv()
    if not csv_text:
        sys.exit(1)

    parsed = parse_data(csv_text)
    if not parsed:
        print('No crop data found', file=sys.stderr)
        sys.exit(1)

    print(f'\nCrops parsed:')
    for crop, years in sorted(parsed.items()):
        yrs = sorted(years.keys())
        print(f'  {crop}: {yrs[0]} to {yrs[-1]} ({len(yrs)} crop years)')

    aafc = build_aafc_data(parsed)

    os.makedirs('data', exist_ok=True)
    out = f'// Auto-generated from StatsCan 32-10-0013-01 \u2014 {time.strftime("%Y-%m-%d %H:%M UTC", time.gmtime())}\n'
    out += f'const AAFC_DATA = {json.dumps(aafc, separators=(",",":"))};\n'

    with open('data/aafc_data.js', 'w') as f:
        f.write(out)

    print(f'\n\u2713 Written data/aafc_data.js ({round(len(out)/1024)}KB)')


if __name__ == '__main__':
    main()
